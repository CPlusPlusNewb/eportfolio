<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>User Class Test Page</title>
</head>
<body>

    <h1>User Class Test Page - Sprint 3</h1>
    <h2>Login</h2>

    <label>Username:</label><br>
    <input type="text" id="username"><br><br>

    <label>Password:</label><br>
    <input type="password" id="password"><br><br>
    <button id="btnLogin">Login</button>

    <hr>

    <h2>Other User Methods (Stubs)</h2>
    <label>User ID:</label><br>
    <input type="number" id="userId" value="1"><br><br>

    <label>Post ID:</label><br>
    <input type="number" id="postId" value="100"><br><br>

    <label>Post Text:</label><br>
    <input type="text" id="postText" value="Hello world"><br><br>

    <button id="btnCreatePost">create_post()</button><br><br>
    <button id="btnEditPost">edit_post()</button><br><br>
    <button id="btnDeletePost">delete_post()</button><br><br>
    <button id="btnBookmark">bookmark_post()</button><br><br>
    <button id="btnRemoveBookmark">remove_bookmark()</button><br><br>
    <button id="btnGetBookmarks">get_bookmarks()</button><br><br>

    <hr>

    <h2>Output</h2>
    <div id="output"></div>

    <script type="module" src="assets/user.js"></script>

</body>
</html>
